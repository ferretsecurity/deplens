rules:
  - name: python-requirements
    filename-regex: '(^|.*[^A-Za-z])requirements([^A-Za-z].*)?\.(txt|in)$'
    py-requirements: {}
  - name: python-requirements-dir
    path-glob: '**/requirements/*.txt'
    py-requirements: {}
  - name: python-uv
    filename-regex: '^uv\.lock$'
    uv-lock: {}
  - name: python-poetry-lock
    filename-regex: '^poetry\.lock$'
    poetry-lock: {}
  - name: python-pipfile-lock
    filename-regex: '^Pipfile\.lock$'
    pipfile-lock: {}
  - name: python-pdm-lock
    filename-regex: '^pdm\.lock$'
    toml:
      exists-any:
        - package
  - name: python-conda-lock
    filename-regex: '^conda-lock\.yml$'
    yaml:
      exists-any:
        - package
  - name: python-pyproject
    filename-regex: '^pyproject\.toml$'
    toml:
      queries:
        - build-system.requires[]
        - project.dependencies[]
        - project.optional-dependencies.*[]
        - dependency-groups.*[]
        - tool.poetry.dependencies
        - tool.poetry.group.*.dependencies
  - name: python-conda-environment
    filename-regex: '^environment\.ya?ml$'
    yaml:
      exists: dependencies
  - name: python-pipfile
    filename-regex: '^Pipfile$'
    toml:
      table-queries:
        - '*'
      exclude-keys:
        - source
        - requires
        - scripts
        - pipenv
  - name: python-setup-py
    filename-regex: '^setup\.py$'
    python:
      call:
        module: setuptools
        function: setup
        conditions:
          any_of:
            - keyword: install_requires
              present: true
            - keyword: extras_require
              present: true
        extract:
          - keyword: install_requires
            literal: string_list
          - keyword: extras_require
            literal: dict_string_lists
  - name: python-setup-cfg
    filename-regex: '^setup\.cfg$'
    ini:
      queries:
        - section: options
          key: setup_requires
        - section: options
          key: install_requires
        - section: options.extras_require
          key: '*'
  - name: js
    filename-regex: '^package\.json$'
    json:
      exists-any:
        - dependencies
        - devDependencies
        - peerDependencies
        - optionalDependencies
  - name: js-bower
    filename-regex: '^bower\.json$'
    json:
      exists-any:
        - dependencies
        - devDependencies
  - name: js-npm-shrinkwrap
    filename-regex: '^npm-shrinkwrap\.json$'
    package-lock: {}
  - name: js-npm-lock
    filename-regex: '^package-lock\.json$'
    package-lock: {}
  - name: js-yarn
    filename-regex: '^yarn\.lock$'
    yarn-lock: {}
  - name: js-pnpm-lock
    filename-regex: '^pnpm-lock\.yaml$'
    pnpm-lock: {}
  - name: js-bun-lock
    filename-regex: '^bun\.lock$'
  - name: js-bun-lockb
    filename-regex: '^bun\.lockb$'
  - name: deno-lock
    filename-regex: '^deno\.lock$'
  - name: deno-json
    filename-regex: '^deno\.json$'
    json:
      exists-any:
        - imports
  - name: deno-jsonc
    filename-regex: '^deno\.jsonc$'
    json:
      exists-any:
        - imports
  - name: java
    filename-regex: '^pom\.xml$'
    xml:
      exists-any:
        - project.dependencies.dependency
  - name: java-gradle-lockfile
    filename-regex: '^gradle\.lockfile$'
  - name: java-gradle
    filename-regex: '^build\.gradle$'
  - name: java-gradle-kts
    filename-regex: '^build\.gradle\.kts$'
  - name: java-gradle-settings
    filename-regex: '^settings\.gradle$'
  - name: java-gradle-settings-kts
    filename-regex: '^settings\.gradle\.kts$'
  - name: ruby-gemfile
    filename-regex: '^Gemfile$'
  - name: ruby-gemfile-lock
    filename-regex: '^Gemfile\.lock$'
  - name: ruby-gemspec
    filename-regex: '.*\.gemspec$'
  - name: swift-package
    filename-regex: '^Package\.swift$'
  - name: ios-podfile
    filename-regex: '^Podfile$'
  - name: ios-cartfile
    filename-regex: '^Cartfile$'
  - name: php-composer
    filename-regex: '^composer\.json$'
    json:
      exists-any:
        - require
        - require-dev
  - name: php-composer-lock
    filename-regex: '^composer\.lock$'
    composer-lock: {}
  - name: dart-pubspec
    filename-regex: '^pubspec\.yaml$'
    yaml:
      exists-any:
        - dependencies
        - dev_dependencies
        - dependency_overrides
  - name: dart-pubspec-lock
    filename-regex: '^pubspec\.lock$'
    yaml:
      exists-any:
        - packages
  - name: erlang-rebar-config
    filename-regex: '^rebar\.config$'
  - name: erlang-rebar-lock
    filename-regex: '^rebar\.lock$'
  - name: clojure-deps-edn
    filename-regex: '^deps\.edn$'
  - name: clojure-project-clj
    filename-regex: '^project\.clj$'
  - name: haskell-stack
    filename-regex: '^stack\.yaml$'
  - name: haskell-stack-lock
    filename-regex: '^stack\.yaml\.lock$'
  - name: haskell-cabal-project
    filename-regex: '^cabal\.project$'
  - name: haskell-cabal
    filename-regex: '.*\.cabal$'
  - name: haskell-package-yaml
    filename-regex: '^package\.yaml$'
    yaml:
      exists-any:
        - dependencies
  - name: dotnet-packages-config
    filename-regex: '^packages\.config$'
    xml:
      exists-any:
        - packages.package
  - name: dotnet-packages-lock
    filename-regex: '^packages\.lock\.json$'
    json:
      exists-any:
        - dependencies
  - name: dotnet-directory-packages-props
    filename-regex: '^Directory\.Packages\.props$'
    xml:
      exists-any:
        - Project.ItemGroup.PackageVersion
  - name: dotnet-paket-dependencies
    filename-regex: '^paket\.dependencies$'
  - name: dotnet-paket-lock
    filename-regex: '^paket\.lock$'
  - name: go-mod
    filename-regex: '^go\.mod$'
    go-mod: {}
  - name: go-sum
    filename-regex: '^go\.sum$'
  - name: go-work
    filename-regex: '^go\.work$'
  - name: go-gopkg-toml
    filename-regex: '^Gopkg\.toml$'
  - name: go-glide-yaml
    filename-regex: '^glide\.yaml$'
    yaml:
      exists-any:
        - import
        - testImport
  - name: rust-cargo
    filename-regex: '^Cargo\.toml$'
    toml:
      table-exists-any:
        - dependencies
        - dev-dependencies
        - build-dependencies
        - workspace.dependencies
        - target.*.dependencies
        - target.*.dev-dependencies
        - target.*.build-dependencies
  - name: rust-cargo-lock
    filename-regex: '^Cargo\.lock$'
    cargo-lock: {}
  - name: go-gopkg-lock
    filename-regex: '^Gopkg\.lock$'
    toml:
      exists-any:
        - projects
  - name: go-glide-lock
    filename-regex: '^glide\.lock$'
  - name: dotnet-csproj
    filename-regex: '.*\.csproj$'
    xml:
      exists-any:
        - Project.ItemGroup.PackageReference
  - name: cpp-conanfile
    filename-regex: '^conanfile\.txt$'
  - name: cpp-conan-lock
    filename-regex: '^conan\.lock$'
  - name: cpp-vcpkg
    filename-regex: '^vcpkg\.json$'
    json:
      exists-any:
        - dependencies
  - name: swift-package-resolved
    filename-regex: '^Package\.resolved$'
    json:
      exists-any:
        - pins
  - name: ios-podfile-lock
    filename-regex: '^Podfile\.lock$'
    yaml:
      exists-any:
        - PODS
        - DEPENDENCIES
  - name: elixir-mix
    filename-regex: '^mix\.exs$'
  - name: elixir-mix-lock
    filename-regex: '^mix\.lock$'
  - name: julia-project
    filename-regex: '^Project\.toml$'
    toml:
      table-exists-any:
        - deps
  - name: julia-manifest
    filename-regex: '^Manifest\.toml$'
    toml:
      table-exists-any:
        - deps
  - name: perl-cpanfile
    filename-regex: '^cpanfile$'
  - name: zig-build-zon
    filename-regex: '^build\.zig\.zon$'
  - name: nim-nimble
    filename-regex: '.*\.nimble$'
  - name: ocaml-opam
    filename-regex: '.*\.opam$'
  - name: crystal-shard
    filename-regex: '^shard\.yml$'
    yaml:
      exists-any:
        - dependencies
  - name: gleam
    filename-regex: '^gleam\.toml$'
    toml:
      table-exists-any:
        - dependencies
  - name: vlang
    filename-regex: '^v\.mod$'
  - name: helm-chart
    filename-regex: '^Chart\.yaml$'
    yaml:
      exists-any:
        - dependencies
  - name: ansible-requirements
    filename-regex: '^requirements\.ya?ml$'
    yaml:
      exists-any:
        - roles
        - collections
  - name: buf
    filename-regex: '^buf\.yaml$'
    yaml:
      exists-any:
        - deps
  - name: homebrew-brewfile
    filename-regex: '^Brewfile$'
  - name: jsonnet-bundler
    filename-regex: '^jsonnetfile\.json$'
    json:
      exists-any:
        - dependencies
  - name: terraform-lock
    filename-regex: '^\.terraform\.lock\.hcl$'
  - name: unity-packages-manifest
    path-glob: 'Packages/manifest.json'
    json:
      exists-any:
        - dependencies
  - name: js-banner-block-start
    filename-regex: '.*\.js$'
    banner-regex: '(?i)^\s*/\*!\s*([A-Za-z0-9@._/-]+)\s+v?(\d+\.\d+\.\d+(?:[-+.\w]*))[^\r\n]*\*/'
  - name: js-banner-plain-block-start
    filename-regex: '.*\.js$'
    banner-regex: '(?i)^\s*/\*\s*([A-Za-z0-9@._/-]+)\s+v?(\d+\.\d+\.\d+(?:[-+.\w]*))[^\r\n]*\*/'
  - name: js-banner-multiline-preserved
    filename-regex: '.*\.js$'
    banner-regex: '(?is)^\s*/\*![\s*]*([A-Za-z0-9@._/-]+)\s+v?(\d+\.\d+\.\d+(?:[-+.\w]*)).*?\*/'
  - name: js-banner-line-comment
    filename-regex: '.*\.js$'
    banner-regex: '(?im)^\s*//[!/]\s*([A-Za-z0-9@._/-]+)\s+v?(\d+\.\d+\.\d+(?:[-+.\w]*))\b'
  - name: js-banner-version-tagged
    filename-regex: '.*\.js$'
    banner-regex: '(?is)^\s*/\*![^*]*package:\s*([A-Za-z0-9@._/-]+)[^*]*version:\s*v?(\d+\.\d+\.\d+(?:[-+.\w]*))[^*]*\*/'
  - name: html-external-scripts
    filename-regex: '.*\.(html|htm|xhtml|tmpl|gohtml|mustache|hbs|njk)$'
    html:
      external_scripts: true
  - name: terraform.aws_glue_job.python
    filename-regex: '.*\.tf$'
    terraform:
      resource_type: aws_glue_job
      conditions:
        - path: default_arguments.--job-language
          equals: python
        - path: default_arguments.--additional-python-modules
          present: true
  - name: typescript.cdk.aws_glue_job.python
    filename-regex: '.*\.ts$'
    typescript:
      cdk_construct:
        module: aws-cdk-lib/aws-glue
        construct: CfnJob
        props_argument_index: 2
        within:
          - defaultArguments
        conditions:
          - key: --additional-python-modules
            present: true
          - key: --job-language
            equals: python
        extract:
          key: --additional-python-modules
          split: comma
  - name: python.cdk.aws_glue_job.python
    filename-regex: '.*\.py$'
    python:
      cdk_construct:
        module: aws_cdk.aws_glue
        construct: CfnJob
        keyword_argument: default_arguments
        conditions:
          - key: --additional-python-modules
            present: true
          - key: --job-language
            equals: python
        extract:
          key: --additional-python-modules
          split: comma
